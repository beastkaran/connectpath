name: ppn_connectpath
description: Proximity Professional Network - ConnectPath

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & State
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
