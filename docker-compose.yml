version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ppnuser
      POSTGRES_PASSWORD: ppnpass
      POSTGRES_DB: ppn_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppnuser -d ppn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://ppnuser:ppnpass@db/ppn_db
      SECRET_KEY: change-this-super-secret-key-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
